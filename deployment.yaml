apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app:  todo-app
    spec:
      containers:
      - name:  todo-app
        image: pranaymedipally/ todo-app:latest  # your Docker Hub image
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
